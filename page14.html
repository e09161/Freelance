<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrián Interview – Gap Filling</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            padding: 15px;
            margin: 0;
            background-color: #f5f7fa;
            color: #333;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h2 {
            color: #2a2a2a;
            border-bottom: 3px solid #0078d4;
            padding-bottom: 12px;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            line-height: 1.3;
        }

        .transcript-container {
            margin-top: 20px;
            background-color: white;
            padding: 20px 15px;
            border-radius: 12px;
            border: 1px solid #e1e5e9;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .gap-input {
            display: inline-block;
            min-width: 60px;
            margin: 2px;
            padding: 8px 10px;
            border: 2px solid #d1d9e6;
            border-radius: 6px;
            background-color: white;
            text-align: center;
            font-family: inherit;
            font-size: 16px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .gap-input:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
        }

        .correct { border-color: #28a745; background-color: #f0fff4; }
        .incorrect { border-color: #dc3545; background-color: #fff0f0; }
        .correct-answer { color: #28a745; font-weight: bold; }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 25px 0 15px 0;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        #checkAnswers { background-color: #0078d4; color: white; }
        #checkAnswers:hover, #checkAnswers:active { background-color: #005fa3; }

        #showAnswers { background-color: #28a745; color: white; }
        #showAnswers:hover, #showAnswers:active { background-color: #218838; }

        #resetGaps { background-color: #ff9800; color: white; }
        #resetGaps:hover, #resetGaps:active { background-color: #e68900; }

        #showFullText { background-color: #6f42c1; color: white; }
        #showFullText:hover, #showFullText:active { background-color: #5a32a3; }

        .instructions {
            background-color: #e8f4fc;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #0078d4;
            font-size: 14px;
            line-height: 1.5;
        }

        .audio-container {
            margin: 20px 0;
            padding: 15px;
            background-color: #f0f7ff;
            border-radius: 10px;
            border: 1px solid #cce0ff;
        }

        .audio-container iframe { border-radius: 6px; overflow: hidden; }

        .results {
            margin-top: 20px;
            padding: 18px;
            border-radius: 10px;
            background-color: #f8f9fa;
            border: 1px solid #e0e0e0;
            display: none;
            font-size: 15px;
        }

        .score { font-size: 18px; font-weight: bold; color: #0078d4; margin-bottom: 12px; text-align: center; }

        .gap-container { position: relative; display: inline-block; margin: 2px; vertical-align: middle; }

        .gap-number {
            position: absolute;
            top: -18px;
            left: 0;
            right: 0;
            font-size: 10px;
            color: #666;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
        }

        .transcript-content p { margin: 0 0 20px 0; font-size: 16px; line-height: 1.7; word-wrap: break-word; }
        .transcript-content p:last-child { margin-bottom: 0; }

        #fullTextDisplay {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.7;
            display: none;
        }

        /* Speaker label styling in full text display */
        .speaker { font-weight: 700; color: #0078d4; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            h2 { font-size: 1.3rem; padding-bottom: 10px; }
            .transcript-container { padding: 15px 12px; }
            .gap-input { min-width: 50px; padding: 6px 8px; font-size: 15px; margin: 1px; }
            .gap-number { font-size: 9px; top: -15px; }
            .transcript-content p { font-size: 15px; line-height: 1.6; }
            button { min-width: 120px; padding: 12px 14px; font-size: 15px; }
            .instructions { padding: 14px; font-size: 13px; }
            .results { padding: 15px; font-size: 14px; }
        }

        @media (max-width: 480px) {
            .buttons-container { flex-direction: column; gap: 8px; }
            button { width: 100%; min-width: auto; }
            .gap-input { min-width: 40px; padding: 5px 6px; font-size: 14px; }
            .transcript-content p { font-size: 14px; line-height: 1.5; }
            h2 { font-size: 1.2rem; }
            .container { padding: 0 8px; }
        }

        .gap-input { min-height: 44px; }
        button { min-height: 50px; touch-action: manipulation; }

        @media (max-width: 360px) {
            .gap-input { min-width: 35px; font-size: 13px; padding: 4px 5px; min-height: 40px; }
            .gap-number { font-size: 8px; top: -12px; }
            .transcript-content p { font-size: 13px; }
        }

        @media (prefers-color-scheme: dark) {
            body { background-color: #1a1a1a; color: #e0e0e0; }
            .transcript-container { background-color: #2d2d2d; border-color: #404040; }
            .instructions { background-color: #2a3b4d; border-left-color: #0078d4; }
            .audio-container { background-color: #2a3b4d; border-color: #404040; }
            .results { background-color: #2d2d2d; border-color: #404040; }
            .gap-input { background-color: #3a3a3a; border-color: #555; color: #e0e0e0; }
            .gap-input::placeholder { color: #888; }
            .correct { background-color: #1e3a1e; }
            .incorrect { background-color: #3a1e1e; }
            #fullTextDisplay { background-color: #2d2d2d; border-color: #404040; }
            .speaker { color: #66aaff; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎧 Adrián Interview – Fill the Gaps</h2>

        <div class="instructions">
            <p><strong>Instructions:</strong> Listen to the audio, then fill in the blanks with the correct words. Press Enter or click "Check Answers" to validate. Answers are case‑insensitive but must be spelled correctly.</p>
        </div>

        <!-- Audio: Adrián interview from SoundCloud -->
        <div class="audio-container">
            <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
                    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2362493300&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
            </iframe>
            <div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;">
                <a href="https://soundcloud.com/edu-casa-346926859" title="Edu CASA" target="_blank" style="color: #cccccc; text-decoration: none;">Edu CASA</a> ·
                <a href="https://soundcloud.com/edu-casa-346926859/adrian_interview" title="adrian_interview" target="_blank" style="color: #cccccc; text-decoration: none;">adrian_interview</a>
            </div>
        </div>

        <div class="transcript-container">
            <h3>Fill in the Blanks:</h3>
            <div id="transcript" class="transcript-content"></div>

            <div class="buttons-container">
                <button id="checkAnswers" onclick="checkAnswers()">✓ Check Answers</button>
                <button id="showAnswers" onclick="showAllAnswers()">👁 Show Answers</button>
                <button id="resetGaps" onclick="generateGaps()">🔄 New Gaps</button>
                <button id="showFullText" onclick="showFullText()">📄 Show Whole Text</button>
            </div>

            <div id="results" class="results">
                <div id="scoreDisplay" class="score"></div>
                <div id="detailedResults"></div>
            </div>

            <div id="fullTextDisplay"></div>
        </div>
    </div>

    <script>
        // The full transcript with speaker labels wrapped in <span> to prevent them from being turned into gaps.
        // Each paragraph is separated by a double newline.
        const originalText = `
<span class="speaker">Interviewer:</span> Good morning, Adrián. Thanks for coming in. Could you start by telling me a bit about yourself?

<span class="speaker">Adrián:</span> Good morning. I hold a bachelor’s degree in Physics, and I’ve spent the last few years blending research with technology. I’m currently working as a programmer and data analyst, building AI and automation solutions, and I’m also finishing a master’s in Artificial Intelligence. My long‑term goal is to become a computational scientist who applies scientific computing and AI to complex, real‑world problems.

<span class="speaker">Interviewer:</span> Interesting. Walk me through your academic trajectory. What took you from Physics into Artificial Intelligence?

<span class="speaker">Adrián:</span> During my undergraduate degree, I joined a research group in medical physics where I worked on numerical simulation and detector calibration. I was using Monte Carlo methods and optimization techniques, and I realized machine learning could accelerate those simulations and make the predictions more robust. That curiosity led me to a graduate program in Artificial Intelligence and Big Data, and later to a second master’s where I’m specializing in reinforcement learning and computer vision.

<span class="speaker">Interviewer:</span> Tell me more about that research. You mentioned a publication. Could you explain what it was about to someone without a technical background?

<span class="speaker">Adrián:</span> Sure. Imagine a camera that uses radiation to see inside the human body. My work was about making those images sharper and more accurate. I built a computer simulation that shoots millions of tiny light particles through a virtual detector, mimicking what happens in the real machine. By comparing the simulation to real measurements, we could calibrate the detector better, so doctors could identify tumors with more precision. That work was published in a peer‑reviewed journal.

<span class="speaker">Interviewer:</span> That’s clear, thank you. Now, let’s talk about your current role. What do you do for a living, and what are your main responsibilities?

<span class="speaker">Adrián:</span> I work as a programmer and data analyst, focusing on AI, automation, and data‑analysis solutions. My main responsibilities include designing predictive models, building data pipelines, and deploying monitoring systems. I also make technical decisions about software architecture and occasionally lead small development projects.

<span class="speaker">Interviewer:</span> Can you share your strongest project so far?

<span class="speaker">Adrián:</span> The one I’m proudest of was an AI‑powered monitoring system for a Network Operations Center. I built a predictive model that analyzes real‑time network traffic and alerts engineers before incidents occur. I designed an API and a data pipeline to feed the model clean data, then deployed everything on the client’s infrastructure. As a result, incident response time dropped by 40%. It taught me a lot about scalability and working under tight deadlines.

<span class="speaker">Interviewer:</span> Where exactly do you apply AI in your everyday work?

<span class="speaker">Adrián:</span> I use machine learning mostly for anomaly detection and predictive maintenance. I’m also exploring reinforcement learning to optimize resource allocation, and I apply computer vision to automate infrastructure inspections — a process that previously took hours of manual review.

<span class="speaker">Interviewer:</span> You work with many people who aren’t engineers. How would you explain, for instance, how a machine learning model learns to a marketing manager?

<span class="speaker">Adrián:</span> I’d say it’s very similar to teaching a child to recognize fruits. You show them many pictures and correct them when they make mistakes. Over time, the child can identify apples and bananas on their own. Training a machine learning model works the same way: you give it lots of examples with the correct answers, and it learns to make predictions without being explicitly programmed for every single case.

<span class="speaker">Interviewer:</span> Good. And how about an API? How would you describe that to a non‑technical person?

<span class="speaker">Adrián:</span> An API is like a waiter in a restaurant. You tell the waiter what you want from the menu, the waiter takes the order to the kitchen, and then brings you your dish. In software, the API is the messenger that takes a request from one system to another and delivers the data back.

<span class="speaker">Interviewer:</span> Where do you see yourself in the next few years?

<span class="speaker">Adrián:</span> In the short term, I plan to finish my master’s and gain more hands‑on experience with high‑performance computing. Long term, I want to become a computational scientist who uses scientific computing and AI to tackle challenges in fields like healthcare or climate science.

<span class="speaker">Interviewer:</span> What keeps you motivated in research? It’s not always a fast‑moving field.

<span class="speaker">Adrián:</span> I enjoy the process of exploring open questions and connecting theory with data. While research can be slow and full of dead ends, the moment when a model finally matches experimental results is incredibly rewarding. That blend of curiosity and problem‑solving is what keeps me going.

<span class="speaker">Interviewer:</span> Can you describe a difficult technical problem you faced and how you solved it?

<span class="speaker">Adrián:</span> Once, a simulation I was running kept producing results that didn’t match the experimental data. I broke the problem down systematically: first, I isolated whether it was a data acquisition issue, an algorithm limitation, or an infrastructure bottleneck. Eventually, I discovered the detector calibration parameters were slightly off. I prototyped a correction algorithm, tested it incrementally, and validated it against new data. That approach — isolating, researching, prototyping — is what I apply whenever I hit a wall.

<span class="speaker">Interviewer:</span> What skills are you actively trying to improve right now?

<span class="speaker">Adrián:</span> On the technical side, I’m deepening my knowledge of reinforcement learning and high‑performance computing. On the professional side, I’m working on my leadership and communication skills, so that I can present technical decisions more effectively to stakeholders who don’t share my background.

<span class="speaker">Interviewer:</span> I think that covers everything I wanted to ask. Thank you for your time, Adrián.

<span class="speaker">Adrián:</span> Thank you. I really enjoyed the conversation.
`;

        let currentGaps = [];
        let gapInputs = [];

        function generateGaps() {
            const container = document.getElementById('transcript');
            const paragraphs = originalText.trim().split('\n\n');
            const resultsDiv = document.getElementById('results');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailedResults = document.getElementById('detailedResults');
            const fullTextDisplay = document.getElementById('fullTextDisplay');

            // Reset state
            currentGaps = [];
            gapInputs = [];
            resultsDiv.style.display = 'none';
            scoreDisplay.textContent = '';
            detailedResults.innerHTML = '';
            fullTextDisplay.style.display = 'none';

            let htmlContent = '';
            let gapCounter = 1;

            paragraphs.forEach(paragraph => {
                const words = paragraph.split(' ');
                const numGaps = Math.floor(words.length * 0.35); // 35% gaps
                const gapIndices = new Set();

                while (gapIndices.size < numGaps) {
                    const i = Math.floor(Math.random() * words.length);
                    const clean = words[i].replace(/[.,!?;:]/g, '');
                    // Skip speaker labels (they contain '<') and very short words/numbers
                    if (!words[i].includes('<') && clean.length > 3 && !/^\d+$/.test(clean)) {
                        gapIndices.add(i);
                    }
                }

                const processedWords = words.map((word, i) => {
                    const clean = word.replace(/[.,!?;:]/g, '');
                    const punctuation = word.match(/[.,!?;:]+$/);

                    if (gapIndices.has(i)) {
                        currentGaps.push({
                            id: gapCounter,
                            correctAnswer: clean.toLowerCase(),
                            fullWord: word,
                            position: gapCounter
                        });

                        const gapHtml = `
                            <span class="gap-container">
                                <span class="gap-number">${gapCounter}</span>
                                <input type="text"
                                       class="gap-input"
                                       id="gap-${gapCounter}"
                                       data-gap-id="${gapCounter}"
                                       placeholder="___"
                                       style="width: ${Math.max(60, clean.length * 8)}px">
                                ${punctuation ? punctuation[0] : ''}
                            </span>
                        `;
                        gapCounter++;
                        return gapHtml;
                    }
                    return word;
                });

                htmlContent += `<p>${processedWords.join(' ')}</p>`;
            });

            container.innerHTML = htmlContent;

            gapInputs = Array.from(document.querySelectorAll('.gap-input'));

            gapInputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        checkAnswers();
                    }
                });

                input.addEventListener('blur', function() {
                    if (this.value.length > 0) {
                        this.style.width = Math.max(60, this.value.length * 8) + 'px';
                    }
                });

                input.addEventListener('focus', function() {
                    this.style.fontSize = '16px';
                });
            });

            document.addEventListener('touchstart', function() {}, { passive: true });
        }

        function checkAnswers() {
            let correctCount = 0;
            const results = [];

            gapInputs.forEach(input => {
                const gapId = parseInt(input.dataset.gapId);
                const userAnswer = input.value.trim().toLowerCase();
                const gapInfo = currentGaps.find(gap => gap.id === gapId);

                if (!gapInfo) return;

                if (userAnswer === gapInfo.correctAnswer) {
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                    correctCount++;
                    results.push({
                        id: gapId,
                        correct: true,
                        userAnswer: userAnswer,
                        correctAnswer: gapInfo.correctAnswer
                    });
                } else {
                    input.classList.add('incorrect');
                    input.classList.remove('correct');
                    results.push({
                        id: gapId,
                        correct: false,
                        userAnswer: userAnswer,
                        correctAnswer: gapInfo.correctAnswer
                    });
                }
            });

            const resultsDiv = document.getElementById('results');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailedResults = document.getElementById('detailedResults');

            const percentage = Math.round((correctCount / currentGaps.length) * 100);
            scoreDisplay.textContent = `Score: ${correctCount}/${currentGaps.length} (${percentage}%)`;

            let detailedHTML = '<h4>Detailed Results:</h4><ul style="margin: 0; padding-left: 20px;">';
            results.forEach(result => {
                if (result.correct) {
                    detailedHTML += `<li style="margin-bottom: 8px;">Gap ${result.id}: ✅ Correct! You answered: "${result.userAnswer}"</li>`;
                } else {
                    detailedHTML += `<li style="margin-bottom: 8px;">Gap ${result.id}: ❌ Incorrect. You answered: "${result.userAnswer}". Correct answer: <span class="correct-answer">"${result.correctAnswer}"</span></li>`;
                }
            });
            detailedHTML += '</ul>';

            detailedResults.innerHTML = detailedHTML;
            resultsDiv.style.display = 'block';

            setTimeout(() => {
                resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showAllAnswers() {
            gapInputs.forEach(input => {
                const gapId = parseInt(input.dataset.gapId);
                const gapInfo = currentGaps.find(gap => gap.id === gapId);

                if (gapInfo) {
                    input.value = gapInfo.correctAnswer;
                    input.style.width = Math.max(60, gapInfo.correctAnswer.length * 8) + 'px';
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                }
            });

            const resultsDiv = document.getElementById('results');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailedResults = document.getElementById('detailedResults');

            scoreDisplay.textContent = `All answers revealed! Perfect score: ${currentGaps.length}/${currentGaps.length} (100%)`;
            detailedResults.innerHTML = '<p>All correct answers have been filled in for you.</p>';
            resultsDiv.style.display = 'block';

            setTimeout(() => {
                resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showFullText() {
            const fullTextDisplay = document.getElementById('fullTextDisplay');
            const transcriptDiv = document.getElementById('transcript');
            const resultsDiv = document.getElementById('results');

            if (fullTextDisplay.style.display === 'block') {
                fullTextDisplay.style.display = 'none';
                transcriptDiv.style.display = 'block';
                document.getElementById('showFullText').textContent = '📄 Show Whole Text';
            } else {
                // Show full text with speaker labels preserved as styled spans
                fullTextDisplay.innerHTML = originalText.trim()
                    .split('\n\n')
                    .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
                    .join('');
                fullTextDisplay.style.display = 'block';
                transcriptDiv.style.display = 'none';
                resultsDiv.style.display = 'none';
                document.getElementById('showFullText').textContent = '🔄 Back to Gaps';
            }
        }

        // Initial setup
        document.getElementById('fullTextDisplay').style.display = 'none';
        document.getElementById('showFullText').textContent = '📄 Show Whole Text';

        generateGaps();

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
