<body>

    <script>
        // ========== Peru Mushroom Market Article ==========
        const originalText = `
Peru Mushroom Market (2025 - 2031) | Analysis, Size, Value, Companies, COVID-19 IMPACT, Share, Revenue, Industry, Growth, Forecast & Trends

Market Forecast By Product (Button, Shiitake, Oyster, Matsutake, Truffles, Others), By Form (Fresh, Processed), By Distribution Channel (Direct to Customer, Grocery Stores, Supermarkets & Hypermarkets, Convenience Store, Online Stores), By Application (Food, Pharmaceuticals, Cosmetics) And Competitive Landscape

The Peru mushroom market presents promising investment opportunities due to increasing consumer awareness of the health benefits and culinary versatility of mushrooms. With a growing demand for organic and specialty mushrooms in the country, investors can explore opportunities in mushroom cultivation, processing, and distribution. Additionally, the rise of urban farming and sustainable agricultural practices in Peru creates a conducive environment for innovative mushroom farming techniques such as vertical farming and controlled environment agriculture. Investing in research and development for new mushroom varieties tailored to the local market preferences can also be a strategic move. Overall, the Peru mushroom market offers potential for growth and diversification for investors looking to capitalize on the increasing popularity of mushrooms in the country.

In Peru, the mushroom market is regulated by government policies that focus on promoting sustainable agriculture practices and ensuring food safety standards. The Ministry of Agriculture and Irrigation oversees the regulation of mushroom production, distribution, and sale, with a specific emphasis on promoting organic cultivation methods and supporting small-scale farmers in the industry. Additionally, the government provides technical assistance and financial incentives to encourage innovation and competitiveness within the mushroom sector. Importantly, there are strict regulations in place to monitor and control the quality and safety of mushrooms sold in the market, including inspections of production facilities and adherence to labeling requirements. Overall, the government policies in Peru aim to foster a thriving and responsible mushroom market that contributes to the country's agricultural development and food security goals.

The Peru Mushroom Market is expected to witness steady growth in the coming years due to increasing consumer awareness about the health benefits of mushrooms and a rising trend of incorporating them in various cuisines. The market is likely to be driven by factors such as growing demand for organic and exotic mushrooms, advancements in mushroom cultivation techniques, and a shift towards plant-based diets among consumers. Additionally, the rising popularity of gourmet mushrooms and the expanding foodservice industry in Peru are expected to further boost market growth. However, challenges such as limited awareness about different mushroom varieties and the availability of substitutes may hinder the market's growth to some extent. Overall, the Peru Mushroom Market is poised for expansion, with opportunities for market players to innovate and diversify their product offerings to cater to evolving consumer preferences.
`;

        let currentGaps = [];
        let gapInputs = [];

        function generateGaps() {
            const container = document.getElementById('transcript');
            const paragraphs = originalText.trim().split('\n\n');
            const resultsDiv = document.getElementById('results');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailedResults = document.getElementById('detailedResults');
            const fullTextDisplay = document.getElementById('fullTextDisplay');

            currentGaps = [];
            gapInputs = [];
            resultsDiv.style.display = 'none';
            scoreDisplay.textContent = '';
            detailedResults.innerHTML = '';
            fullTextDisplay.style.display = 'none';

            let htmlContent = '';
            let gapCounter = 1;

            paragraphs.forEach(paragraph => {
                const words = paragraph.split(' ');
                const numGaps = Math.floor(words.length * 0.35);
                const gapIndices = new Set();

                while (gapIndices.size < numGaps) {
                    const i = Math.floor(Math.random() * words.length);
                    const clean = words[i].replace(/[.,!?;:]/g, '');
                    if (clean.length > 3 && !/^\d+$/.test(clean) && !words[i].includes('<')) {
                        gapIndices.add(i);
                    }
                }

                const processedWords = words.map((word, i) => {
                    const clean = word.replace(/[.,!?;:]/g, '');
                    const punctuation = word.match(/[.,!?;:]+$/);

                    if (gapIndices.has(i)) {
                        currentGaps.push({
                            id: gapCounter,
                            correctAnswer: clean.toLowerCase(),
                            fullWord: word,
                            position: gapCounter
                        });

                        const gapHtml = `
                            <span class="gap-container">
                                <span class="gap-number">${gapCounter}</span>
                                <input type="text"
                                       class="gap-input"
                                       id="gap-${gapCounter}"
                                       data-gap-id="${gapCounter}"
                                       placeholder="___"
                                       style="width: ${Math.max(60, clean.length * 8)}px">
                                ${punctuation ? punctuation[0] : ''}
                            </span>
                        `;
                        gapCounter++;
                        return gapHtml;
                    }
                    return word;
                });

                htmlContent += `<p>${processedWords.join(' ')}</p>`;
            });

            container.innerHTML = htmlContent;

            gapInputs = Array.from(document.querySelectorAll('.gap-input'));

            gapInputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        checkAnswers();
                    }
                });

                input.addEventListener('blur', function() {
                    if (this.value.length > 0) {
                        this.style.width = Math.max(60, this.value.length * 8) + 'px';
                    }
                });

                input.addEventListener('focus', function() {
                    this.style.fontSize = '16px';
                });
            });

            document.addEventListener('touchstart', function() {}, { passive: true });
        }

        function checkAnswers() {
            let correctCount = 0;
            const results = [];

            gapInputs.forEach(input => {
                const gapId = parseInt(input.dataset.gapId);
                const userAnswer = input.value.trim().toLowerCase();
                const gapInfo = currentGaps.find(gap => gap.id === gapId);

                if (!gapInfo) return;

                if (userAnswer === gapInfo.correctAnswer) {
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                    correctCount++;
                    results.push({
                        id: gapId,
                        correct: true,
                        userAnswer: userAnswer,
                        correctAnswer: gapInfo.correctAnswer
                    });
                } else {
                    input.classList.add('incorrect');
                    input.classList.remove('correct');
                    results.push({
                        id: gapId,
                        correct: false,
                        userAnswer: userAnswer,
                        correctAnswer: gapInfo.correctAnswer
                    });
                }
            });

            const resultsDiv = document.getElementById('results');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailedResults = document.getElementById('detailedResults');

            const percentage = Math.round((correctCount / currentGaps.length) * 100);
            scoreDisplay.textContent = `Score: ${correctCount}/${currentGaps.length} (${percentage}%)`;

            let detailedHTML = '<h4>Detailed Results:</h4><ul style="margin: 0; padding-left: 20px;">';
            results.forEach(result => {
                if (result.correct) {
                    detailedHTML += `<li style="margin-bottom: 8px;">Gap ${result.id}: ✅ Correct! You answered: "${result.userAnswer}"</li>`;
                } else {
                    detailedHTML += `<li style="margin-bottom: 8px;">Gap ${result.id}: ❌ Incorrect. You answered: "${result.userAnswer}". Correct answer: <span class="correct-answer">"${result.correctAnswer}"</span></li>`;
                }
            });
            detailedHTML += '</ul>';

            detailedResults.innerHTML = detailedHTML;
            resultsDiv.style.display = 'block';

            setTimeout(() => {
                resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showAllAnswers() {
            gapInputs.forEach(input => {
                const gapId = parseInt(input.dataset.gapId);
                const gapInfo = currentGaps.find(gap => gap.id === gapId);

                if (gapInfo) {
                    input.value = gapInfo.correctAnswer;
                    input.style.width = Math.max(60, gapInfo.correctAnswer.length * 8) + 'px';
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                }
            });

            const resultsDiv = document.getElementById('results');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const detailedResults = document.getElementById('detailedResults');

            scoreDisplay.textContent = `All answers revealed! Perfect score: ${currentGaps.length}/${currentGaps.length} (100%)`;
            detailedResults.innerHTML = '<p>All correct answers have been filled in for you.</p>';
            resultsDiv.style.display = 'block';

            setTimeout(() => {
                resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showFullText() {
            const fullTextDisplay = document.getElementById('fullTextDisplay');
            const transcriptDiv = document.getElementById('transcript');
            const resultsDiv = document.getElementById('results');

            if (fullTextDisplay.style.display === 'block') {
                fullTextDisplay.style.display = 'none';
                transcriptDiv.style.display = 'block';
                document.getElementById('showFullText').textContent = '📄 Show Whole Text';
            } else {
                fullTextDisplay.innerHTML = originalText.trim()
                    .split('\n\n')
                    .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
                    .join('');
                fullTextDisplay.style.display = 'block';
                transcriptDiv.style.display = 'none';
                resultsDiv.style.display = 'none';
                document.getElementById('showFullText').textContent = '🔄 Back to Gaps';
            }
        }

        document.getElementById('fullTextDisplay').style.display = 'none';
        document.getElementById('showFullText').textContent = '📄 Show Whole Text';

        generateGaps();

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
